<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="top-part">
        <div class="left-section">
            <h1>My Notes 📚</h1>
        </div>
        <div class="right-section">
            <button class="add-note"> + Add Notes</button>
            <button class="mode">🌙</button>
        </div>
    </div>


         <div class="note-display">

    </div>




    <div class="add-new-note-container">
        <div class="add-new-note">
            <p class="add-new-note-p">Add New Note</p>
            <button class="close-btn">X</button>
        </div>

        <div class="enter-note-title">
            <p>Title</p>
            <input class="note-title" type="text" placeholder=" Enter note title...">
        </div>
        <div class="enter-note-content">
            <p>Content</p>
            <textarea placeholder="Enter your note content..." class="note-content"></textarea>
            
        </div>
        <div class="last-part">
            <button class="cancelBtn">Cancel</button>
            <button class="saveBtn">Save Now</button>
        </div>

   
    </div>


    <script src="app.js"></script>
</body>
</html>
